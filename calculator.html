<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css Tutorial</title>
    <style>
        * {
            margin: 0;
        }

        body {
            background-color: skyblue;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        table>thead>tr>th input {
            padding: 30px;
            font-size: 20px;
            border-radius: 12px;
        }

        .text {
            text-align: left;
            padding-left: 10px;
            font-size: 24px;
            color: black;
            padding-right: 100px;

        }

        * {

            font-weight: bold;
        }

        .number-3>tr>th>input {
            background-color: rgb(178, 213, 226);
            font-weight: bold;
        }

        .number-2>tr>th>input {
            background-color: yellow;
            font-weight: bold;
        }

        .header {
            width: 100%;
            min-height: 5vh;
            background-color: blue;
            border: 1px solid red;
            color: white;
            display: flex;
            align-items : center;
            justify-content: center;

        }

        .items ul li{
            list-style-type: none;
            display: inline;
            background-color: pink;
            margin: 10px;

        }
        h1{
            margin-top: 20px;
        }
    </style>
    
</head>

<body>

    <h1>Calculator</h1>
    <table border="1px" bgcolor="red" cellpadding="20" cellspacing="5" style="border-radius: 10px;">
        <thead class="number-1">
            <tr>
                <th colspan="4"><input type="text" width="10" class="text" style="text-align: left;"> </th>
            </tr>
        </thead>
        <thead class="number-2">

            <tr>
                <th><input type="button" value="+"> </th>
                <th><input type="button" value="-"> </th>
                <th><input type="button" value="*"> </th>
                <th><input type="button" value="/"> </th>
            </tr>
        </thead>

        <thead class="number-3">
            <tr>
                <th><input type="button" value="7"> </th>
                <th><input type="button" value="8"> </th>
                <th><input type="button" value="9"> </th>
                <th><input type="button" value="4"> </th>
            </tr>
        </thead>
        <thead class="number-3">

            <tr>
                <th><input type="button" value="5"> </th>
                <th><input type="button" value="6"> </th>
                <th><input type="button" value="1"> </th>
                <th><input type="button" value="2"> </th>
            </tr>
        </thead>
        <thead class="number-3">

            <tr>
                <th><input type="button" value="3"> </th>
                <th><input type="button" value="0"> </th>
                <th><input type="button" value="."> </th>
                <th><input type="button" value="C"> </th>
            </tr>
        </thead>
        <thead>

            <tr>
                <th colspan="4"><input type="button" value="="> </th>
            </tr>
        </thead>


    </table>
    


</body>

</html>
