<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="https://cdn-icons-png.magnific.com/512/5968/5968267.png" type="image/x-icon">
    <title>Giplox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .header {
            width: 100vw;
            height: 40px;
            background-color: black;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header p {
            color: white;
            font-family: arial, 'poppins';
            font-size: 16 px;
            font-weight: bold;

        }

        .nav {
            width: 100vw;
            min-height: 70px;
            background-color: white;

        }

        .nav>.items {
            display: flex;
            align-items: center;
            justify-content: space-around;

        }

        .nav>.items>.ul-li>ul li {
            list-style-type: none;
            display: inline;
            padding: 20px;
            font-family: arial, 'poppins';
            font-weight: bold;
            text-transform: uppercase;
        }

        .collec-items {
            padding: 50px;
            background-color: black;
            color: white;

        }
    </style>
</head>

<body>
    <div class="header">
        <p>Premium Drinkware for Everyday Living!</p>
    </div>

    <div class="nav">
        <div class="items">
            <div class="logo">
                <img src="product-image/giplox.png" width="150px" alt="">
            </div>
            <div class="ul-li">
                <ul>

                    <li>
                         <div class="nav-item">
                            <a href="#">Collections</a>
                            <div class="dropdown">
                                <ul>

                                    <li>Everyday Collection</li>
                                    <li>Gym Collection</li>
                                    <li>Kids Collection</li>
                                    <li>Office Collection</li>
                                    <li>Travels Collection</li>

                                </ul>
                            </div>
                        </div>
                    </li>
                    <li>Drinkware</li>
                    <li>Personalize</li>
                    <li>Shop By Shop</li>
                    <li>About</li>
                    <li>Contact</li>
                </ul>
            </div>


        </div>

    </div>

</body>

</html>
